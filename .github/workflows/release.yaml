name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release_linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Linux Graphics Headers
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libgl1-mesa-dev libxcursor-dev libxi-dev libxinerama-dev libxrandr-dev libxxf86vm-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release_mac:
    needs: release_linux
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build darwin binaries
        run: |
          VERSION=${{ github.ref_name }}
          CGO_ENABLED=1 GOOS=darwin GOARCH=amd64 go build -ldflags "-s -w -X main.version=${VERSION}" -o estacao-atlas .
          tar -czf estacao-atlas_${VERSION}_darwin_amd64.tar.gz estacao-atlas
          rm estacao-atlas

          CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 go build -ldflags "-s -w -X main.version=${VERSION}" -o estacao-atlas .
          tar -czf estacao-atlas_${VERSION}_darwin_arm64.tar.gz estacao-atlas

      - name: Upload darwin artifacts to release
        run: gh release upload ${{ github.ref_name }} estacao-atlas_${{ github.ref_name }}_darwin_amd64.tar.gz estacao-atlas_${{ github.ref_name }}_darwin_arm64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: release_mac
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        run: gh release edit ${{ github.ref_name }} --draft=false --repo ${{ github.repository }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
